<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&amp;family=Manrope:wght@300;400;600;800&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#144bb8",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                        "earth-gold": "#a38e6d",
                        "earth-clay": "#4a443f",
                        "soft-gray": "#e2e8f0"
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "serif": ["Playfair Display", "serif"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
    <style>
        .serif-header { font-family: 'Playfair Display', serif; }
        .manrope-text { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark manrope-text text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-6 md:px-20 lg:px-40 py-4 bg-white dark:bg-slate-900">
    <div class="flex items-center gap-4 text-primary">
        <span class="material-symbols-outlined text-3xl">policy</span>
        <h2 class="text-slate-900 dark:text-slate-100 text-sm font-bold leading-tight tracking-wider uppercase">Strategisk Analyse</h2>
    </div>
    <div class="flex flex-1 justify-end gap-8">
        <a href="{{ url_for('index') }}" class="text-xs font-bold uppercase tracking-widest hover:text-primary transition-colors">Tilbage</a>
    </div>
</header>
<main class="flex-1 max-w-[1100px] mx-auto w-full px-6 py-12">
    <div class="text-center mb-16">
        <p class="text-earth-gold text-xs font-bold uppercase tracking-[0.4em] mb-4">PRIMÆR RAPPORT</p>
        <h1 class="serif-header text-4xl md:text-6xl font-light italic mb-4 leading-tight">Analysedeklaration:</h1>
        <h2 class="serif-header text-4xl md:text-6xl font-bold mb-8">{{ result.tracker_id | replace('_', ' ') | title }}</h2>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-12 gap-16">
        <div class="md:col-span-12 lg:col-span-8">
            <h3 class="text-slate-900 dark:text-slate-100 text-2xl serif-header font-bold mb-6">Observation</h3>
            <div class="space-y-6 text-slate-700 dark:text-slate-300 leading-relaxed text-lg font-light">
                <p>{{ result.observation }}</p>
                <blockquote class="border-l-4 border-earth-gold pl-8 py-4 my-10 italic serif-header text-2xl text-slate-600 dark:text-slate-400">
                    "{{ result.aktuel_data }}"
                </blockquote>
                <p>Kilde: <a href="{{ result.kilde_url }}" class="text-primary underline" target="_blank">{{ result.kilde_url }}</a></p>
            </div>
        </div>
        <div class="md:col-span-12 lg:col-span-4">
            <div class="bg-white dark:bg-slate-900 p-8 border border-slate-200 dark:border-slate-800 shadow-sm">
                <h4 class="text-xs font-bold text-earth-gold uppercase tracking-widest mb-6">Status</h4>
                <div class="space-y-6">
                    <div>
                        <p class="text-slate-500 text-xs uppercase mb-1">Aktuel Status</p>
                        <p class="text-2xl font-bold {% if result.status == 'ALARM' %}text-red-500{% else %}text-slate-900 dark:text-slate-100{% endif %}">
                            {{ result.status }}
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</div>
</body>
</html>
